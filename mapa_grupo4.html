<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QGIS Web - Grupo 4 | Falta de Dados</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css" />
  
  <style>
    :root { --primary: #f59e0b; --sidebar-bg: #ffffff; --text: #1e293b; --border: #e2e8f0; }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    body, html { height: 100%; overflow: hidden; }
    #app { display: flex; height: 100vh; width: 100vw; }
    #map-container { flex: 1; position: relative; }
    #map { height: 100%; width: 100%; }
    #sidebar { width: 350px; background: var(--sidebar-bg); border-left: 1px solid var(--border); display: flex; flex-direction: column; z-index: 1000; transition: transform 0.3s ease; }
    .sidebar-header { padding: 1.5rem; border-bottom: 1px solid var(--border); }
    .sidebar-header h1 { font-size: 1.25rem; font-weight: 800; color: var(--primary); }
    .sidebar-content { flex: 1; overflow-y: auto; padding: 1.5rem; }
    .kpi-grid { display: grid; grid-template-columns: 1fr; gap: 1rem; margin-bottom: 2rem; }
    .kpi-card { background: #fffbeb; padding: 1rem; border-radius: 12px; border: 1px solid #fde68a; }
    .kpi-value { font-size: 1.5rem; font-weight: 800; color: var(--primary); }
    .kpi-label { font-size: 0.75rem; color: #92400e; text-transform: uppercase; font-weight: 600; }
    .layer-control { margin-bottom: 2rem; }
    .layer-item { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.75rem; font-size: 0.9rem; }
    .slider-container { margin-top: 1rem; }
    .slider-container input { width: 100%; margin-top: 0.5rem; }
    .export-btn { background: var(--primary); color: white; border: none; padding: 0.75rem; border-radius: 8px; font-weight: 600; cursor: pointer; width: 100%; }
    .legend { background: white; padding: 1rem; border-radius: 8px; border: 1px solid var(--border); font-size: 0.85rem; margin-top: 1rem; }
    .legend-item { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem; }
    .color-box { width: 20px; height: 12px; border-radius: 2px; }
  </style>
</head>
<body>
  <div id="app">
    <div id="map-container">
      <div id="map"></div>
    </div>
    <aside id="sidebar">
      <div class="sidebar-header">
        <h1>QGIS Web | Dados</h1>
        <p>Invisibilidade Estatística em Cuiabá</p>
      </div>
      <div class="sidebar-content">
        <div class="kpi-grid">
          <div class="kpi-card">
            <div class="kpi-value">68%</div>
            <div class="kpi-label">Território Mapeado</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-value">R$ 4,2M</div>
            <div class="kpi-label">Verba Geoprocessamento</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-value">142</div>
            <div class="kpi-label">Pedidos LAI Pendentes</div>
          </div>
        </div>
        <div class="layer-control">
          <h3>Filtros e Camadas</h3>
          <div class="layer-item"><input type="checkbox" checked onchange="toggleLayer('mapped')"> Áreas Mapeadas</div>
          <div class="layer-item"><input type="checkbox" checked onchange="toggleLayer('missing')"> Gaps de Dados (Vermelho)</div>
          <div class="layer-item"><input type="checkbox" onchange="toggleLayer('denuncias')"> Pontos de Denúncia</div>
          
          <div class="slider-container">
            <p>Evolução Temporal: <span id="year-label">2026</span></p>
            <input type="range" min="2020" max="2026" value="2026" oninput="updateTime(this.value)">
          </div>
        </div>
        <div class="legend">
          <div class="legend-item"><div class="color-box" style="background: #10b981;"></div> 100% Mapeado</div>
          <div class="legend-item"><div class="color-box" style="background: #ef4444;"></div> Sem Dados Cadastrais</div>
          <div class="legend-item"><div class="color-box" style="background: #f59e0b;"></div> Em Processo (Mapeamento)</div>
        </div>
        <button class="export-btn" style="margin-top: 1rem;">Exportar Relatório Geo</button>
      </div>
    </aside>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>
  <script>
    const map = L.map('map').setView([-15.6014, -56.0979], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    const layers = {};
    
    layers.mapped = L.geoJSON({
      type: "FeatureCollection",
      features: [{ type: "Feature", geometry: { type: "Polygon", coordinates: [[[-56.12, -15.58], [-56.08, -15.58], [-56.08, -15.61], [-56.12, -15.61], [-56.12, -15.58]]] } }]
    }, { style: { color: '#10b981', fillOpacity: 0.2 } }).addTo(map);

    layers.missing = L.geoJSON({
      type: "FeatureCollection",
      features: [{ type: "Feature", properties: { neighborhood: "Ribeirão do Lipa" }, geometry: { type: "Polygon", coordinates: [[[-56.15, -15.63], [-56.13, -15.63], [-56.13, -15.65], [-56.15, -15.65], [-56.15, -15.63]]] } }]
    }, { style: { color: '#ef4444', fillOpacity: 0.5 } }).addTo(map);

    function toggleLayer(key) {
      if (map.hasLayer(layers[key])) map.removeLayer(layers[key]);
      else map.addLayer(layers[key]);
    }

    function updateTime(val) {
      document.getElementById('year-label').innerText = val;
      const opacity = (val - 2020) / 6;
      layers.mapped.setStyle({ fillOpacity: opacity * 0.4 });
    }
  </script>
</body>
</html>
