<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QGIS Web - Grupo 4 | Falta de Dados</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css" />
  
  <style>
    :root { --primary: #f59e0b; --sidebar-bg: #ffffff; --text: #1e293b; --border: #e2e8f0; }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    body, html { height: 100%; overflow: hidden; }
    #app { display: flex; height: 100vh; width: 100vw; }
    #map-container { flex: 1; position: relative; }
    #map { height: 100%; width: 100%; }
    
    .return-btn { position: absolute; top: 1rem; left: 3.5rem; z-index: 1000; background: white; border: 2px solid var(--primary); color: var(--primary); padding: 0.6rem 1.2rem; border-radius: 8px; font-weight: 800; text-decoration: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    
    #sidebar { width: 350px; background: var(--sidebar-bg); border-left: 1px solid var(--border); display: flex; flex-direction: column; z-index: 1000; }
    .sidebar-header { padding: 1.5rem; border-bottom: 1px solid var(--border); }
    .sidebar-header h1 { font-size: 1.25rem; font-weight: 800; color: var(--primary); }
    
    .kpi-card { background: #fffbeb; padding: 1rem; border-radius: 12px; border: 1px solid #fde68a; margin: 1.5rem; }
    .gauge-container { height: 10px; background: #e2e8f0; border-radius: 5px; margin-top: 10px; overflow: hidden; }
    .gauge-fill { height: 100%; background: var(--primary); width: 68%; transition: 0.5s; }
    
    .tool-section { padding: 1.5rem; border-top: 1px solid var(--border); }
    .btn-tool { background: #fffbeb; border: 1px solid #fde68a; padding: 0.6rem; border-radius: 6px; cursor: pointer; width: 100%; margin-bottom: 0.5rem; font-size: 0.85rem; font-weight: 600; text-align: left; }
    .btn-tool:hover { background: #fef3c7; }
  </style>
</head>
<body>
  <div id="app">
    <div id="map-container">
      <a href="grupo4.html" class="return-btn">← Voltar para Apresentação</a>
      <div id="map"></div>
    </div>
    
    <aside id="sidebar">
      <div class="sidebar-header">
        <h1>QGIS Web | Dados</h1>
        <p>Invisibilidade Territorial</p>
      </div>
      
      <div class="kpi-card">
        <div style="display: flex; justify-content: space-between;">
          <span style="font-weight: 800; color: var(--primary);">Transparência</span>
          <span id="perc-label">68%</span>
        </div>
        <div class="gauge-container"><div class="gauge-fill" id="gauge"></div></div>
        <p style="font-size: 0.7rem; margin-top: 5px; color: #92400e;">Território Mapeado oficialmente</p>
      </div>

      <div class="tool-section">
        <h3>Modos de Visualização</h3>
        <button class="btn-tool" onclick="setBase('osm')">🗺️ Mapa de Ruas (OSM)</button>
        <button class="btn-tool" onclick="setBase('sat')">🛰️ Visão de Satélite (Esri)</button>
        <button class="btn-tool" onclick="toggleLayer('missing')">🛑 Destacar Gaps (Vermelho)</button>
      </div>

      <div class="tool-section">
        <h3>Histórico Cadastral</h3>
        <input type="range" min="2020" max="2026" value="2026" style="width: 100%;" oninput="updateTime(this.value)">
        <p style="text-align: center; font-weight: 800; margin-top: 10px;">Ano: <span id="year-label">2026</span></p>
      </div>

      <div class="tool-section">
        <button class="btn-tool" onclick="resetMap()">🎯 Centralizar no Ribeirão</button>
      </div>
    </aside>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>

  <script>
    const map = L.map('map').setView([-15.584, -56.075], 13);
    const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    const satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}');

    const layers = {};
    layers.missing = L.polygon([
      [-15.58, -56.08], [-15.59, -56.08], [-15.59, -56.07], [-15.58, -56.07]
    ], { color: '#ef4444', fillOpacity: 0.5 }).addTo(map).bindPopup("<b>Ribeirão do Lipa</b><br>Zona de Expansão sem Cadastro.");

    function setBase(type) {
      if(type === 'osm') { map.addLayer(osm); map.removeLayer(satellite); }
      else { map.addLayer(satellite); map.removeLayer(osm); }
    }

    function toggleLayer(key) {
      if (map.hasLayer(layers[key])) map.removeLayer(layers[key]);
      else map.addLayer(layers[key]);
    }

    function updateTime(val) {
      document.getElementById('year-label').innerText = val;
      const perc = 40 + ((val - 2020) * 5);
      document.getElementById('perc-label').innerText = perc + "%";
      document.getElementById('gauge').style.width = perc + "%";
    }

    function resetMap() { map.setView([-15.584, -56.075], 15); }

    new L.Control.Draw({ position: 'topleft' }).addTo(map);
  </script>
</body>
</html>
