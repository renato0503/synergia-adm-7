<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QGIS Web - Grupo 2 | Transporte Público</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
  
  <style>
    :root { --primary: #2563eb; --sidebar-bg: #ffffff; --text: #1e293b; --border: #e2e8f0; }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    body, html { height: 100%; overflow: hidden; }
    #app { display: flex; height: 100vh; width: 100vw; }
    #map-container { flex: 1; position: relative; }
    #map { height: 100%; width: 100%; }
    
    .return-btn { position: absolute; top: 1rem; left: 3.5rem; z-index: 1000; background: white; border: 2px solid var(--primary); color: var(--primary); padding: 0.6rem 1.2rem; border-radius: 8px; font-weight: 800; text-decoration: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: 0.3s; }
    .return-btn:hover { background: var(--primary); color: white; }

    #sidebar { width: 350px; background: var(--sidebar-bg); border-left: 1px solid var(--border); display: flex; flex-direction: column; z-index: 1000; box-shadow: -4px 0 15px rgba(0,0,0,0.05); }
    .sidebar-header { padding: 1.5rem; border-bottom: 1px solid var(--border); background: var(--bg-soft); }
    .sidebar-header h1 { font-size: 1.25rem; font-weight: 800; color: var(--primary); }
    .sidebar-content { flex: 1; overflow-y: auto; padding: 1.5rem; }
    
    .kpi-card { background: #f8fafc; padding: 1rem; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 1rem; }
    .kpi-value { font-size: 1.5rem; font-weight: 800; color: var(--primary); }
    .kpi-label { font-size: 0.75rem; color: #64748b; text-transform: uppercase; font-weight: 600; }
    
    .tool-section { margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--border); }
    .tool-section h3 { font-size: 0.9rem; margin-bottom: 1rem; }
    .btn-tool { background: #f1f5f9; border: 1px solid var(--border); padding: 0.5rem; border-radius: 6px; cursor: pointer; width: 100%; margin-bottom: 0.5rem; font-size: 0.85rem; font-weight: 600; text-align: left; }
    .btn-tool:hover { background: #e2e8f0; }

    .bus-icon { font-size: 20px; text-shadow: 0 0 5px white; }
  </style>
</head>
<body>
  <div id="app">
    <div id="map-container">
      <a href="grupo2.html" class="return-btn">← Voltar para Apresentação</a>
      <div id="map"></div>
    </div>
    
    <aside id="sidebar">
      <div class="sidebar-header">
        <h1>QGIS Web | Transporte</h1>
        <p>Monitoramento e Planejamento</p>
      </div>
      <div class="sidebar-content">
        <div class="kpi-card">
          <div class="kpi-value" id="bus-count">0</div>
          <div class="kpi-label">Ônibus em Tempo Real (Simulação)</div>
        </div>
        
        <div class="tool-section">
          <h3>Camadas de Análise</h3>
          <label class="btn-tool"><input type="checkbox" checked onchange="toggleLayer('routes')"> Rotas de Ônibus</label>
          <label class="btn-tool"><input type="checkbox" checked onchange="toggleLayer('stops')"> Pontos de Parada</label>
          <label class="btn-tool"><input type="checkbox" checked onchange="toggleLayer('deficit')"> Áreas de Exclusão</label>
        </div>

        <div class="tool-section">
          <h3>Simulador de Mobilidade</h3>
          <button class="btn-tool" onclick="startSimulation()">▶ Iniciar Simulação de Frota</button>
          <button class="btn-tool" onclick="resetView()">🎯 Centralizar no Pedregal</button>
        </div>

        <div class="tool-section">
          <h3>Ferramentas QGIS</h3>
          <p style="font-size: 0.8rem; color: #64748b; margin-bottom: 0.5rem;">Use a barra lateral esquerda para medir distâncias e áreas.</p>
          <button class="btn-tool" onclick="exportView()">📸 Exportar Captura</button>
        </div>
      </div>
    </aside>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>

  <script>
    const map = L.map('map', { center: [-15.618, -56.046], zoom: 14 });
    const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    const satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}');

    const layers = {};
    
    // Rota Real
    const routeCoords = [[-15.61, -56.09], [-15.612, -56.07], [-15.615, -56.05], [-15.618, -56.046]];
    layers.routes = L.polyline(routeCoords, { color: '#2563eb', weight: 5, opacity: 0.7 }).addTo(map);

    // Pontos de Parada
    layers.stops = L.markerClusterGroup();
    routeCoords.forEach((c, i) => {
      L.circleMarker(c, { radius: 8, color: 'white', fillColor: '#2563eb', fillOpacity: 1, weight: 2 })
        .bindPopup(`<b>Parada ${i+1}</b><br>Linha: 311 - CPA/Centro`)
        .addTo(layers.stops);
    });
    layers.stops.addTo(map);

    // Área de Déficit
    layers.deficit = L.polygon([
      [-15.62, -56.05], [-15.63, -56.05], [-15.63, -56.04], [-15.62, -56.04]
    ], { color: '#ef4444', fillOpacity: 0.3 }).addTo(map).bindPopup("<b>Bairro Pedregal</b><br>Área sem cobertura asfáltica.");

    // Simulação de Ônibus
    let busMarker = null;
    let busIndex = 0;
    function startSimulation() {
      if(busMarker) map.removeLayer(busMarker);
      busMarker = L.marker(routeCoords[0], { icon: L.divIcon({ html: '🚌', className: 'bus-icon' }) }).addTo(map);
      document.getElementById('bus-count').innerText = "1 Ativo";
      
      const interval = setInterval(() => {
        busIndex = (busIndex + 1) % routeCoords.length;
        busMarker.setLatLng(routeCoords[busIndex]);
        if(busIndex === 0) { clearInterval(interval); document.getElementById('bus-count').innerText = "Simulação Finalizada"; }
      }, 2000);
    }

    // Ferramentas
    function toggleLayer(key) {
      if (map.hasLayer(layers[key])) map.removeLayer(layers[key]);
      else map.addLayer(layers[key]);
    }
    function resetView() { map.setView([-15.618, -56.046], 15); }
    function exportView() { window.print(); }

    // Draw tools
    const drawControl = new L.Control.Draw({
      draw: { polygon: true, polyline: true, rectangle: false, circle: false, circlemarker: false, marker: false }
    });
    map.addControl(drawControl);
  </script>
</body>
</html>
